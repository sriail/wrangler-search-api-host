# =============================================================
#  wrangler.toml — Orchestrator (Main Worker)
#  Rename this file to exactly:  wrangler.toml
#
#  Directory layout:
#    orchestrator/
#    ├── wrangler.toml        ← this file (renamed)
#    ├── main-worker.js
#    └── registry.json
#
#  Commands:
#    wrangler deploy                     deploy to Cloudflare
#    wrangler dev                        local dev server (NOT wrangler pages dev)
#    wrangler secret put INTERNAL_SECRET set the shared auth secret
# =============================================================

name               = "llm-search-orchestrator"
main               = "main-worker.js"
compatibility_date = "2024-09-23"
workers_dev        = true

# ── Non-secret vars (safe to commit) ─────────────────────────
[vars]
WORKER_ENV  = "production"
WORKER_NAME = "orchestrator"

# ── KV Namespace — OPTIONAL dynamic registry fallback ────────
# Leave this block commented out until you have a real namespace ID.
# Without it, the worker reads surrogates purely from registry.json.
#
# HOW TO ENABLE:
#   Step 1 — Create the namespace and copy the returned ID:
#     wrangler kv:namespace create REGISTRY_KV
#
#   Step 2 — Paste the real ID below, then uncomment the block:
#     [[kv_namespaces]]
#     binding    = "REGISTRY_KV"
#     id         = "paste_your_32char_hex_id_here"
#
#   Step 3 — Redeploy:
#     wrangler deploy
#
#   Step 4 — Push surrogate list into KV:
#     wrangler kv:key put --namespace-id=<YOUR_ID> surrogates \
#       '[{"id":"s1","url":"https://llm-search-surrogate-1.YOUR.workers.dev","enabled":true}]'
#
# [[kv_namespaces]]
# binding    = "REGISTRY_KV"
# id         = "PASTE_REAL_32_CHAR_HEX_ID_HERE"

# ── Secrets — run AFTER every deploy ─────────────────────────
# Never put secret values in this file (they would be committed
# to source control in plain text).
#
#   wrangler secret put INTERNAL_SECRET
#   → Paste a long random value, e.g.:  openssl rand -hex 32
#   → Use the SAME value on every Surrogate Worker.
#
# To rotate the secret across all workers at once:
#   SECRET=$(openssl rand -hex 32)
#   echo $SECRET | wrangler secret put INTERNAL_SECRET
#   cd ../surrogate-1 && echo $SECRET | wrangler secret put INTERNAL_SECRET
#   cd ../surrogate-2 && echo $SECRET | wrangler secret put INTERNAL_SECRET

# ── Custom domain (optional) ──────────────────────────────────
# Uncomment and fill in to use your own domain instead of
# the default  llm-search-orchestrator.<account>.workers.dev
#
# [[routes]]
# pattern   = "search-api.yourdomain.com/*"
# zone_name = "yourdomain.com"
